<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <title>Drishti - Attendance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+Gujarati:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --surface2: #f0f3fa;
            --border: #dde3f0;
            --accent: #1a56db;
            --accent2: #e67e22;
            --text: #1a202c;
            --text-muted: #6b7280;
            --green: #16a34a;
            --red: #e74c3c;
            --blue: #1a56db;
            --card-shadow: 0 2px 16px rgba(0,0,0,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; color-scheme: light only; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #f4f6fb !important; --surface: #ffffff !important; --surface2: #f0f3fa !important; --border: #dde3f0 !important; --text: #1a202c !important; --text-muted: #6b7280 !important; }
            body { background: #f4f6fb !important; color: #1a202c !important; }
            input, select { background: #f0f3fa !important; color: #1a202c !important; }
        }
        body { font-family: 'Noto Sans Gujarati', 'Segoe UI', 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ATTENDANCE APP STYLES */
        #attendanceApp { padding-bottom: 75px; min-height: 100vh; background: var(--bg); }
        .att-header { background: linear-gradient(135deg, #1a56db 0%, #1e3a8a 100%); border-bottom: 2px solid #1a56db; padding: 12px 16px; position: sticky; top: 0; z-index: 200; display: flex; justify-content: space-between; align-items: center; }
        .att-header-logo { display: flex; align-items: center; gap: 10px; }
        .att-header-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .att-header-title .main { font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 700; color: #ffffff; letter-spacing: 1px; }
        .att-header-title .sub { font-size: 10px; color: rgba(255,255,255,0.65); letter-spacing: 2px; text-transform: uppercase; }
        .att-header-right { display: flex; gap: 8px; align-items: center; }
        .refresh-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: all 0.2s; }
        .refresh-btn:hover { background: rgba(255,255,255,0.3); }
        .content { padding: 14px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; box-shadow: var(--card-shadow); animation: fadeUp 0.3s ease both; }
        .card-title { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        #attendanceApp label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 14px; margin-bottom: 5px; }
        #attendanceApp input, #attendanceApp select { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; transition: border-color 0.2s; -webkit-appearance: none; }
        #attendanceApp input:focus, #attendanceApp select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(240,165,0,0.1); }
        #attendanceApp input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
        #attendanceApp select option { background: var(--surface2); color: var(--text); }
        .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 1px; cursor: pointer; margin-top: 14px; transition: all 0.2s; text-transform: uppercase; }
        .btn-green { background: linear-gradient(135deg, #27ae60, #2ecc71); color: #fff; }
        .btn-green:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(46,204,113,0.3); }
        .btn-orange { background: linear-gradient(135deg, #e67e22, #f39c12); color: #fff; }
        .btn-dark { background: linear-gradient(135deg, #2c3e50, #34495e); color: var(--accent); border: 1px solid var(--accent); }
        .btn-del { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; font-family: 'Rajdhani', sans-serif; font-weight: 700; width: auto; transition: opacity 0.2s; }
        .btn-del:hover { opacity: 0.8; }
        .btn-edit { background: var(--accent); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; font-family: 'Rajdhani', sans-serif; font-weight: 700; width: auto; transition: opacity 0.2s; margin-right: 4px; }
        .btn-edit:hover { opacity: 0.8; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 999; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: var(--surface); border-radius: 16px; padding: 24px 20px; width: 90%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); animation: fadeUp 0.25s ease both; }
        .modal-title { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
        .modal-actions button { flex: 1; margin-top: 0; }
        .date-container { display: flex; align-items: center; gap: 8px; }
        .date-arrow { width: 42px; height: 42px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--accent); font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
        .date-arrow:hover { background: var(--accent); color: #000; }
        .date-container input { flex: 1; }
        .leave-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 12px 14px; margin-top: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .leave-box label { margin: 0; color: #1a56db; font-size: 12px; letter-spacing: 1px; }
        .leave-box select, .leave-box input[type="number"] { width: auto; padding: 8px 10px; font-size: 13px; background: var(--surface); }
        .att-tab-content { display: none; }
        .att-active-tab { display: block; }
        .att-bottom-nav { position: fixed; bottom: 0; width: 100%; background: #ffffff; border-top: 1px solid var(--border); display: flex; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); z-index: 200; }
        .att-nav-item { flex: 1; text-align: center; padding: 9px 4px; font-size: 10px; cursor: pointer; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.2s; border-top: 2px solid transparent; font-family: 'Rajdhani', sans-serif; font-weight: 600; }
        .att-nav-item.active { color: var(--accent); border-top-color: var(--accent); }
        .att-nav-item span { display: block; font-size: 20px; margin-bottom: 2px; }
        #attendanceApp table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12px; table-layout: fixed; }
        #attendanceApp th { background: var(--surface2); color: var(--accent); font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 9px 6px; border: 1px solid var(--border); font-weight: 700; }
        #attendanceApp td { border: 1px solid var(--border); padding: 8px 5px; text-align: center; word-wrap: break-word; color: var(--text); font-size: 12px; }
        #attendanceApp tbody tr:hover { background: rgba(240,165,0,0.04); }
        .att-report-block { page-break-before: always; padding: 16px 0; border-top: 1px solid var(--border); }
        .att-report-block h3 { font-family: 'Rajdhani', sans-serif; color: var(--accent); letter-spacing: 1px; font-size: 15px; margin-bottom: 8px; }
        .master-section { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 10px; padding: 12px 14px; margin-top: 12px; }
        .master-section label { color: #c2410c; }
        .person-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); color: var(--text); font-size: 14px; }
        .person-row:last-child { border-bottom: none; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="attendanceApp">
    <div class="att-header">
        <div class="att-header-logo">
            <div class="att-header-icon">👥</div>
            <div class="att-header-title">
                <div class="main">Attendance</div>
                <div class="sub">Drishti Flanges & Metal</div>
            </div>
        </div>
        <div class="att-header-right">
            <div class="refresh-btn" onclick="location.reload()">🔄</div>
        </div>
    </div>

    <div class="content">
        <!-- ENTRY TAB -->
        <div id="att_entry" class="att-tab-content att-active-tab">
            <div class="card">
                <div class="card-title">📝 રોજિંદી એન્ટ્રી</div>
                <label>તારીખ</label>
                <div class="date-container">
                    <button class="date-arrow" onclick="attChangeDate(-1)">‹</button>
                    <input type="date" id="dailyDate">
                    <button class="date-arrow" onclick="attChangeDate(1)">›</button>
                </div>
                <label>કર્મચારી નામ</label>
                <select id="dailyName" class="att-name-list"></select>
                <div id="dailyTimeBox">
                    <label>In Time</label>
                    <input type="time" id="dailyIn" value="08:00">
                    <label>Out Time</label>
                    <input type="time" id="dailyOut" value="19:30">
                    <label>બ્રેક (કલાકમાં)</label>
                    <input type="number" id="dailyBreak" step="0.1" value="0">
                </div>
                <div class="leave-box">
                    <input type="checkbox" id="isLeave" onchange="attToggleLeaveMode()">
                    <label for="isLeave">🏖️ રજા છે?</label>
                    <select id="leaveType" style="display:none;">
                        <option value="Personal">Personal Leave</option>
                        <option value="Public">Public Holiday</option>
                    </select>
                    <input type="number" id="leaveHrs" placeholder="કલાક" style="display:none; width:80px;">
                </div>
                <label>વિગત / નોંધ</label>
                <input type="text" id="dailyRemark" placeholder="નોંધ લખો...">
                <button class="btn btn-green" onclick="attSaveDaily()">✓ સેવ કરો</button>
            </div>
        </div>

        <!-- REPORT TAB -->
        <div id="att_report" class="att-tab-content">
            <div class="card">
                <div class="card-title print-hide">📊 રિપોર્ટ</div>
                <div class="print-hide">
                    <label>કર્મચારી પસંદ કરો</label>
                    <select id="reportName" class="att-name-list" onchange="attShowReport()"></select>
                    <div style="display:flex; gap:8px; align-items:flex-end; margin-top:6px;">
                        <div style="flex:2;">
                            <label>📅 રિપોર્ટ મહિનો</label>
                            <select id="reportMonth" onchange="attShowReport()">
                                <option value="01">જાન્યુ</option><option value="02">ફેબ્રુ</option>
                                <option value="03">માર્ચ</option><option value="04">એપ્રિ</option>
                                <option value="05">મે</option><option value="06">જૂન</option>
                                <option value="07">જુલા</option><option value="08">ઓગ</option>
                                <option value="09">સપ્ટ</option><option value="10">ઓક્ટ</option>
                                <option value="11">નવે</option><option value="12">ડિસે</option>
                            </select>
                        </div>
                        <div style="flex:1.5;">
                            <label>📆 વર્ષ</label>
                            <input type="number" id="reportYear" value="2025" min="2020" max="2099" onchange="attShowReport()">
                        </div>
                        <div style="flex:1;">
                            <label>A / B</label>
                            <select id="reportAB" onchange="attShowReport()">
                                <option value="A">A</option>
                                <option value="B">B</option>
                            </select>
                        </div>
                    </div>
                    <input type="hidden" id="reportFrom"><input type="hidden" id="reportTo">
                    <div class="master-section" style="margin-top:10px;">
                        <div style="display:flex; gap:8px; align-items:flex-end;">
                            <div style="flex:2;">
                                <label>🔶 માસ્ટર મહિનો</label>
                                <select id="masterMonth" onchange="attShowReport()">
                                    <option value="01">જાન્યુ</option><option value="02">ફેબ્રુ</option>
                                    <option value="03">માર્ચ</option><option value="04">એપ્રિ</option>
                                    <option value="05">મે</option><option value="06">જૂન</option>
                                    <option value="07">જુલા</option><option value="08">ઓગ</option>
                                    <option value="09">સપ્ટ</option><option value="10">ઓક્ટ</option>
                                    <option value="11">નવે</option><option value="12">ડિસે</option>
                                </select>
                            </div>
                            <div style="flex:1.5;">
                                <label>📆 વર્ષ</label>
                                <input type="number" id="masterYear" value="2025" min="2020" max="2099" onchange="attShowReport()">
                            </div>
                        </div>
                        <div style="font-size:11px; color:#c2410c; margin-top:6px; font-style:italic;">A + B બંનેનો ડેટા એક સાથે</div>
                    </div>
                    <input type="hidden" id="masterFrom"><input type="hidden" id="masterTo">
                    <button class="btn btn-dark" onclick="attDownloadPDF()" style="margin-top:10px;">📥 Download PDF</button>
                </div>
            </div>
            <div id="att_pdf_area">
                <div id="summaryContainer"></div>
                <div id="reportContainer"></div>
            </div>
        </div>

        <!-- SETTING TAB -->
        <div id="att_setting" class="att-tab-content">
            <div class="card">
                <div class="card-title">➕ નવો કર્મચારી</div>
                <label>નામ</label>
                <input type="text" id="newNameInput" placeholder="નામ લખો...">
                <button class="btn btn-green" onclick="attAddPerson()">+ એડ કરો</button>
            </div>
            <div class="card">
                <div class="card-title">👥 કર્મચારી લિસ્ટ</div>
                <div id="pListDisplay" style="color:var(--text-muted); font-size:14px;">લોડ થઈ રહ્યું છે...</div>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="attEditModal">
        <div class="modal-box">
            <div class="modal-title">✏️ એન્ટ્રી સુધારો</div>
            <input type="hidden" id="editId">
            <label>તારીખ</label>
            <input type="date" id="editDate">
            <label>In Time</label>
            <input type="time" id="editIn">
            <label>Out Time</label>
            <input type="time" id="editOut">
            <div class="modal-actions">
                <button class="btn btn-green" onclick="attSaveEdit()">✓ સેવ</button>
                <button class="btn btn-dark" onclick="attCloseEditModal()">✕ રદ</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="att-bottom-nav">
        <div class="att-nav-item active" onclick="attShowTab('att_entry', this)"><span>📝</span>એન્ટ્રી</div>
        <div class="att-nav-item" onclick="attShowTab('att_report', this)"><span>📊</span>રિપોર્ટ</div>
        <div class="att-nav-item" onclick="attShowTab('att_setting', this)"><span>⚙️</span>સેટિંગ</div>
    </div>
</div>

<script>
    window.attShowTab = (id, el) => {
        document.querySelectorAll('.att-tab-content').forEach(t => t.classList.remove('att-active-tab'));
        document.querySelectorAll('.att-nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('att-active-tab');
        el.classList.add('active');
    };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    // Attendance App Firebase (attendance-96700)
    const attFirebaseConfig = {
        apiKey: "AIzaSyAuBd2AioQmGZQ_-ZGtkJ6ZHIYh0GqR4E0",
        authDomain: "attendance-96700.firebaseapp.com",
        databaseURL: "https://attendance-96700-default-rtdb.firebaseio.com",
        projectId: "attendance-96700",
        storageBucket: "attendance-96700.firebasestorage.app",
        messagingSenderId: "945000495965",
        appId: "1:945000495965:web:6f4297ce9005b9681846b4"
    };

    const attApp = initializeApp(attFirebaseConfig, "attendanceApp");
    const attDb = getDatabase(attApp);
    let attPersons = [];
    let attAttendance = [];

    // Init attendance app
    window.attAppReady = () => {
        document.getElementById('dailyDate').valueAsDate = new Date();
        const now = new Date();
        const curMonth = String(now.getMonth() + 1).padStart(2, '0');
        const curYear = now.getFullYear();
        ['reportMonth','masterMonth'].forEach(id => { const el = document.getElementById(id); if(el) el.value = curMonth; });
        ['reportYear','masterYear'].forEach(id => { const el = document.getElementById(id); if(el) el.value = curYear; });
    };

    onValue(ref(attDb, 'persons'), (snap) => {
        const d = snap.val();
        attPersons = d ? Object.entries(d).map(([key, name]) => ({ key, name })) : [];
        attUpdateLists();
        attRenderSettingList();
    });

    onValue(ref(attDb, 'attendance'), (snap) => {
        const d = snap.val();
        attAttendance = d ? Object.entries(d).map(([id, val]) => ({ id, ...val })) : [];
    });

    window.attChangeDate = (days) => {
        const dInput = document.getElementById('dailyDate');
        let d = new Date(dInput.value);
        d.setDate(d.getDate() + days);
        dInput.valueAsDate = d;
    };

    window.attAddPerson = () => {
        const name = document.getElementById('newNameInput').value.trim();
        if (name) { push(ref(attDb, 'persons'), name); document.getElementById('newNameInput').value = ""; alert("નામ ઉમેરાઈ ગયું!"); }
    };

    window.attDeletePerson = (key) => {
        if (confirm("શું તમે આ નામ કાઢી નાખવા માંગો છો?")) remove(ref(attDb, `persons/${key}`));
    };

    function attRenderSettingList() {
        const container = document.getElementById('pListDisplay');
        let html = "";
        attPersons.forEach(p => {
            html += `<div class="person-row">
                <span>${p.name}</span>
                <button class="btn-del" onclick="attDeletePerson('${p.key}')">✕ કાઢો</button>
            </div>`;
        });
        container.innerHTML = html || "<span style='color:var(--text-muted)'>કોઈ નામ નથી.</span>";
    }

    window.attToggleLeaveMode = () => {
        const isL = document.getElementById('isLeave').checked;
        document.getElementById('dailyTimeBox').style.display = isL ? 'none' : 'block';
        document.getElementById('leaveType').style.display = isL ? 'inline-block' : 'none';
        document.getElementById('leaveHrs').style.display = isL ? 'inline-block' : 'none';
    };

    function attCheckDuplicate(name, date) {
        return attAttendance.some(a => a.name === name && a.date === date);
    }

    function attCalcHours(i, o) {
        if (!i || !o || i === "--" || o === "--") return 0;
        let [h1, m1] = i.split(':').map(Number);
        let [h2, m2] = o.split(':').map(Number);
        let d = (h2 * 60 + m2) - (h1 * 60 + m1);
        if (d < 0) d += 1440;
        return (d / 60);
    }

    window.attSaveDaily = async () => {
        const date = document.getElementById('dailyDate').value;
        const name = document.getElementById('dailyName').value;
        if (!name || !date) return alert("નામ અને તારીખ પસંદ કરો!");
        if (attCheckDuplicate(name, date)) return alert("Error: આ તારીખની એન્ટ્રી પહેલેથી થયેલી છે!");

        const isL = document.getElementById('isLeave').checked;
        const bHrs = parseFloat(document.getElementById('dailyBreak').value || 0);
        const rem = document.getElementById('dailyRemark').value.trim();

        let tin = "--", tout = "--", hrs = 0, lType = "";
        if (!isL) {
            tin = document.getElementById('dailyIn').value;
            tout = document.getElementById('dailyOut').value;
            hrs = (attCalcHours(tin, tout) - bHrs).toFixed(1);
        } else {
            lType = document.getElementById('leaveType').value;
            hrs = parseFloat(document.getElementById('leaveHrs').value || 0);
        }

        const id = push(ref(attDb, 'attendance')).key;
        await set(ref(attDb, `attendance/${id}`), { name, date, tin, tout, breakHrs: bHrs, hours: hrs, item: rem, leaveType: lType });
        alert("✓ સેવ થયું!");
        document.getElementById('dailyRemark').value = "";
    };

    window.attSaveBulk = async () => {
        const name = document.getElementById('bulkName').value;
        const from = document.getElementById('bulkFrom').value;
        const to = document.getElementById('bulkTo').value;
        if (!name || !from || !to) return alert("નામ અને તારીખ રેન્જ ભરો!");

        let start = new Date(from);
        let end = new Date(to);
        let count = 0;

        while (start <= end) {
            let dStr = start.toISOString().split('T')[0];
            if (!attCheckDuplicate(name, dStr)) {
                let tin = document.getElementById('bulkIn').value;
                let tout = document.getElementById('bulkOut').value;
                let bHrs = parseFloat(document.getElementById('bulkBreak').value || 0);
                let hrs = (attCalcHours(tin, tout) - bHrs).toFixed(1);
                const id = push(ref(attDb, 'attendance')).key;
                await set(ref(attDb, `attendance/${id}`), { name, date: dStr, tin, tout, breakHrs: bHrs, hours: hrs, item: "", leaveType: "" });
                count++;
            }
            start.setDate(start.getDate() + 1);
        }
        alert(count + " નવી એન્ટ્રી સેવ થઈ!");
    };

    // Helper: compute date range from month+year+AB (A=1-15, B=16-end)
    function attGetDateRange(month, year, ab) {
        const y = parseInt(year);
        const m = String(parseInt(month)).padStart(2, '0');
        if (ab === 'A') {
            return { from: `${y}-${m}-01`, to: `${y}-${m}-15` };
        } else {
            const lastDay = new Date(y, parseInt(month), 0).getDate();
            return { from: `${y}-${m}-16`, to: `${y}-${m}-${String(lastDay).padStart(2, '0')}` };
        }
    }

    window.attShowReport = () => {
        const sel = document.getElementById('reportName').value;

        // Compute report date range from Month+Year+AB selectors
        const rMonth = document.getElementById('reportMonth').value;
        const rYear = document.getElementById('reportYear').value;
        const rAB = document.getElementById('reportAB').value;
        const { from, to } = attGetDateRange(rMonth, rYear, rAB);
        document.getElementById('reportFrom').value = from;
        document.getElementById('reportTo').value = to;

        // Compute master date range — full month (A + B both)
        const mMonth = document.getElementById('masterMonth').value;
        const mYear = document.getElementById('masterYear').value;
        const mY = parseInt(mYear);
        const mM = String(parseInt(mMonth)).padStart(2, '0');
        const mLastDay = new Date(mY, parseInt(mMonth), 0).getDate();
        const mFrom = `${mY}-${mM}-01`;
        const mTo = `${mY}-${mM}-${String(mLastDay).padStart(2, '0')}`;
        document.getElementById('masterFrom').value = mFrom;
        document.getElementById('masterTo').value = mTo;

        document.getElementById('summaryContainer').innerHTML = "";
        document.getElementById('reportContainer').innerHTML = "";
        if (!sel) return;

        let names = (sel === "ALL") ? attPersons.map(p => p.name) : [sel];
        let nData = []; let mData = [];

        names.forEach(n => {
            const data = attAttendance.filter(a => a.name === n && (!from || a.date >= from) && (!to || a.date <= to)).sort((a, b) => new Date(a.date) - new Date(b.date));
            if (data.length > 0) {
                let s = attCalcStats(data);
                nData.push({ name: n, ...s });
                attRenderDetailTable(n, data, s);
            }
            if (mFrom && mTo) {
                const mD = attAttendance.filter(a => a.name === n && (a.date >= mFrom && a.date <= mTo));
                if (mD.length > 0) mData.push({ name: n, ...attCalcStats(mD) });
            }
        });
        attRenderCombinedSummary(nData, mData);
    };

    function attCalcStats(data) {
        let hrs = 0, pL = 0, hL = 0, wD = 0;
        data.forEach(a => {
            hrs += parseFloat(a.hours || 0);
            if (a.leaveType === "Personal") pL++;
            else if (a.leaveType === "Public" || a.item?.includes("Sunday")) hL++;
            else wD++;
        });
        return { hrs: hrs.toFixed(1), pL, hL, wD, totalL: (pL + hL) };
    }

    function attRenderCombinedSummary(nData, mData) {
        let h = `<div style="margin-bottom:20px;">
            <h2 style="text-align:center; font-family:'Rajdhani',sans-serif; color:#f0a500; letter-spacing:2px; margin-bottom:12px;">OPERATOR SUMMARY</h2>
            <table><thead><tr>
                <th style="text-align:left;">Name</th>
                <th>Hrs</th><th>Work Days</th><th>P.L</th><th>H.L</th><th>Total Leave</th>
            </tr></thead><tbody>`;
        nData.forEach(s => {
            h += `<tr>
                <td style="text-align:left; font-weight:600;">${s.name}</td>
                <td><b>${s.hrs}</b></td><td>${s.wD}</td>
                <td style="color:#e67e22;">${s.pL}</td>
                <td style="color:#e74c3c;">${s.hL}</td>
                <td><b>${s.totalL}</b></td>
            </tr>`;
        });
        h += `</tbody></table>`;
        if (mData.length > 0) {
            const mMonthEl = document.getElementById('masterMonth');
            const mYearEl = document.getElementById('masterYear');
            const mLabel = mMonthEl ? mMonthEl.options[mMonthEl.selectedIndex].text + ' ' + (mYearEl ? mYearEl.value : '') + ' (A + B)' : '';
            h += `<h2 style="margin-top:20px; text-align:center; font-family:'Rajdhani',sans-serif; color:#ff6b35; letter-spacing:2px; margin-bottom:12px;">MASTER SUMMARY · ${mLabel}</h2>
                <table><thead><tr style="background:#e67e22 !important;">
                    <th style="text-align:left; color:white;">Name</th>
                    <th style="color:white;">Hrs</th><th style="color:white;">Work Days</th>
                    <th style="color:white;">P.L</th><th style="color:white;">H.L</th><th style="color:white;">Total Leave</th>
                </tr></thead><tbody>`;
            mData.forEach(s => {
                h += `<tr>
                    <td style="text-align:left; font-weight:600;">${s.name}</td>
                    <td><b>${s.hrs}</b></td><td>${s.wD}</td>
                    <td style="color:#e67e22;">${s.pL}</td>
                    <td style="color:#e74c3c;">${s.hL}</td>
                    <td><b>${s.totalL}</b></td>
                </tr>`;
            });
            h += `</tbody></table>`;
        }
        document.getElementById('summaryContainer').innerHTML = h;
    }

    function attRenderDetailTable(name, data, stats) {
        let h = `<div class="att-report-block">
            <h3>${name}
                <span style="font-size:12px; color:var(--text-muted); font-weight:400; margin-left:8px;">
                    Total: ${stats.hrs} hrs | Work: ${stats.wD} | P.L: ${stats.pL} | H.L: ${stats.hL}
                </span>
            </h3>
            <table><thead><tr>
                <th>Date</th><th>Remark</th><th>In</th><th>Out</th><th>Break</th><th>Net Hrs</th>
                <th class="att-del-col" style="width:70px;">✕/✏️</th>
            </tr></thead><tbody>`;

        data.forEach(a => {
            const dateStr = a.date.split('-').reverse().join('/');
            const isLeave = a.leaveType && a.leaveType !== "";
            const leaveLabel = a.leaveType === "Personal" ? "Personal Leave" : a.leaveType === "Public" ? "Public Holiday" : "";
            const remarkDisplay = isLeave
                ? `<span style="color:${a.leaveType === "Personal" ? "#e67e22" : "#e74c3c"}; font-weight:bold;">${leaveLabel}</span>${a.item ? ' · ' + a.item : ''}`
                : (a.item || '');
            const rowStyle = isLeave ? `background:${a.leaveType === "Personal" ? "rgba(230,126,34,0.08)" : "rgba(231,76,60,0.08)"};` : "";

            h += `<tr style="${rowStyle}">
                <td style="font-weight:600;">${dateStr}</td>
                <td style="text-align:left;">${remarkDisplay}</td>
                <td>${a.tin}</td><td>${a.tout}</td>
                <td style="color:#e74c3c;">${a.breakHrs || 0}</td>
                <td><b style="color:#2ecc71;">${a.hours}</b></td>
                <td class="att-del-col">
                    <button class="btn-edit" onclick="attEditEntry('${a.id}')">✏️</button>
                    <button class="btn-del" onclick="attDeleteEntry('${a.id}')">✕</button>
                </td>
            </tr>`;
        });
        h += `</tbody></table></div>`;
        document.getElementById('reportContainer').innerHTML += h;
    }

    // Helper: get date range from month+year+AB
    function getDateRangeFromAB(month, year, ab) {
        const y = parseInt(year);
        const m = String(parseInt(month)).padStart(2, '0');
        if (ab === 'A') {
            return { from: `${y}-${m}-01`, to: `${y}-${m}-15` };
        } else {
            const lastDay = new Date(y, parseInt(month), 0).getDate();
            return { from: `${y}-${m}-16`, to: `${y}-${m}-${lastDay}` };
        }
    }

    window.attDownloadPDF = () => {
        const from = document.getElementById('reportFrom').value;
        const to   = document.getElementById('reportTo').value;
        const sel  = document.getElementById('reportName').value;
        if (!from || !to || !sel) return alert("પહેલાં રિપોર્ટ load કરો.");

        // Period label
        const rMonthEl  = document.getElementById('reportMonth');
        const rABEl     = document.getElementById('reportAB');
        const rYear     = document.getElementById('reportYear').value;
        const monthName = rMonthEl ? rMonthEl.options[rMonthEl.selectedIndex].text : from;
        const abLabel   = rABEl ? rABEl.value : '';
        const periodLabel = `${monthName} ${rYear} - ${abLabel}`;

        // Master selected?
        const mFrom = document.getElementById('masterFrom').value;
        const mTo   = document.getElementById('masterTo').value;
        const masterSelected = mFrom && mTo;

        // Build content from rendered att_pdf_area — clone so we can strip buttons
        const areaEl = document.getElementById('att_pdf_area');
        const clone  = areaEl.cloneNode(true);

        // Remove edit/delete buttons columns
        clone.querySelectorAll('.att-del-col, [onclick*="attEditEntry"], [onclick*="attDeleteEntry"]').forEach(el => el.remove());
        // Remove last th (✕/✏️) and last td in each row
        clone.querySelectorAll('table').forEach(tbl => {
            tbl.querySelectorAll('thead tr').forEach(tr => {
                const lastTh = tr.querySelector('th:last-child');
                if (lastTh && (lastTh.textContent.includes('✕') || lastTh.textContent.includes('✏'))) lastTh.remove();
            });
            tbl.querySelectorAll('tbody tr').forEach(tr => {
                const lastTd = tr.querySelector('td:last-child');
                if (lastTd && lastTd.querySelectorAll('button').length > 0) lastTd.remove();
            });
        });

        // If master NOT selected, remove master summary section from clone
        if (!masterSelected) {
            const masterH2 = clone.querySelector('h2[style*="ff6b35"], h2[style*="MASTER"]');
            if (masterH2) {
                let el = masterH2;
                while (el && el.tagName !== 'TABLE') { const nx = el.nextElementSibling; el.remove(); el = nx; }
                if (el && el.tagName === 'TABLE') el.remove();
            }
        }

        // Fix rgba backgrounds for print
        clone.querySelectorAll('tr[style]').forEach(tr => {
            const bg = tr.style.background || tr.style.backgroundColor;
            if (bg && bg.includes('rgba')) {
                tr.style.background = bg.includes('230,126') ? '#fff8ee' : '#fff0f0';
            }
        });

        const element = document.createElement('div');
        element.style.cssText = "font-family: 'Segoe UI', Arial, sans-serif; color: #000; background: white; width: 100%;";
        element.innerHTML = `
            <div style="text-align:center; padding:18px 0 12px; border-bottom:3px solid #2c3e50; margin-bottom:16px;">
                <h1 style="margin:0; font-size:20px; color:#2c3e50; letter-spacing:2px; font-family:'Rajdhani',sans-serif;">DRISHTI FLANGES &amp; METAL</h1>
                <p style="margin:4px 0 0; color:#7f8c8d; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;">Attendance Report &nbsp;·&nbsp; ${periodLabel}</p>
            </div>
            <style>
                * { box-sizing: border-box; }
                table { width:100%; border-collapse:collapse; margin:6px 0 10px; font-size:9.5px; table-layout:fixed; }
                th { background:#2c3e50; color:white; padding:5px 4px; text-align:center; border:1px solid #555; font-size:9px; letter-spacing:0.4px; font-weight:700; }
                td { border:1px solid #bbb; padding:4px 3px; text-align:center; color:#000; font-size:9px; word-break:break-word; }
                td:nth-child(2) { text-align:left; }
                th:nth-child(2) { text-align:left; }
                .att-report-block { page-break-before:always; padding:10px 0 4px; border-top:2px solid #2c3e50; margin-top:10px; }
                .att-report-block h3 { font-size:12px; color:#2c3e50; margin-bottom:4px; font-family:'Segoe UI',sans-serif; }
                .att-report-block h3 span { font-size:9px; color:#666; font-weight:400; }
                h2 { font-size:13px; text-align:center; margin:12px 0 6px; letter-spacing:1px; }
                tbody tr:nth-child(even) { background: #f8f8f8; }
                .summary-page { margin-bottom:12px; }
            </style>
        ` + clone.innerHTML;

        const opt = {
            margin:     [8, 6, 8, 6],
            filename:   `Attendance_${abLabel}_${monthName}_${rYear}.pdf`,
            html2canvas: { scale: 2.5, useCORS: true, logging: false },
            jsPDF:      { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    };

    window.attDeleteEntry = (id) => {
        if (confirm("ખરેખર ડીલીટ કરવું છે?")) {
            remove(ref(attDb, `attendance/${id}`));
            alert("ડીલીટ થઈ ગયું!");
            attShowReport();
        }
    };

    window.attEditEntry = (id) => {
        const entry = attAttendance.find(a => a.id === id);
        if (!entry) return;
        document.getElementById('editId').value = id;
        document.getElementById('editDate').value = entry.date;
        document.getElementById('editIn').value = entry.tin !== '--' ? entry.tin : '';
        document.getElementById('editOut').value = entry.tout !== '--' ? entry.tout : '';
        document.getElementById('attEditModal').classList.add('open');
    };

    window.attSaveEdit = async () => {
        const id = document.getElementById('editId').value;
        const date = document.getElementById('editDate').value;
        const tin = document.getElementById('editIn').value || '--';
        const tout = document.getElementById('editOut').value || '--';
        if (!date) return alert("તારીખ ભરો!");

        const entry = attAttendance.find(a => a.id === id);
        const bHrs = parseFloat(entry?.breakHrs || 0);
        const hrs = (tin !== '--' && tout !== '--') ? (attCalcHours(tin, tout) - bHrs).toFixed(1) : entry?.hours || 0;

        await update(ref(attDb, `attendance/${id}`), { date, tin, tout, hours: hrs });
        document.getElementById('attEditModal').classList.remove('open');
        alert("✓ સુધારો સેવ થઈ ગયો!");
        attShowReport();
    };

    window.attCloseEditModal = () => {
        document.getElementById('attEditModal').classList.remove('open');
    };

    window.attUpdateLists = () => {
        document.querySelectorAll('.att-name-list').forEach(l => {
            let opt = "<option value=''>-- નામ પસંદ કરો --</option>";
            if (l.id === "reportName") opt += "<option value='ALL'>⊞ All Employees</option>";
            attPersons.forEach(p => opt += `<option value="${p.name}">${p.name}</option>`);
            l.innerHTML = opt;
        });
    };

    // Auto-init on page load
    window.attAppReady();
</script>

</body>
</html>
